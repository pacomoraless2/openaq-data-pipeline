version: 2

models:
  - name: int_sensors_enriched
    description: "Silver layer view. Enriches sensor-level data with location metadata to provide full geographical context per sensor. Grain is one row per sensor per logical date."
    columns:
      - name: sensor_record_id
        description: "Primary key. Unique identifier for the sensor at a specific logical date."
        tests:
          - unique
          - not_null
      - name: sensor_id
        description: "Identifier for the specific sensor instrument."
      - name: parameter_name
        description: "Name of the parameter being measured (e.g., pm25, temperature)."
      - name: location_id
        description: "Identifier for the physical monitoring station."
      - name: latitude
        description: "Latitude coordinate of the station."
      - name: longitude
        description: "Longitude coordinate of the station."
      - name: parameter_id
        description: "Numeric ID of the parameter being measured."
      - name: unit
        description: "Standardized unit of measurement for the sensor's parameter (e.g., µg/m³, °C)."
      - name: logical_date
        description: "Airflow logical date (execution date) representing the snapshot day."
      - name: location_name
        description: "Name of the monitoring location."
      - name: country_code
        description: "Two-letter ISO country code."
      - name: country_name
        description: "Full name of the country where the station is located."
# ----------------------------------------------------------------
  - name: int_valid_measurements
    description: "Silver layer view. Cleans raw measurements by standardizing timestamps, filtering out physical anomalies (e.g., out-of-bounds temperatures), and removing null values."
    columns:
      - name: sensor_id
        description: "Identifier for the specific sensor instrument. Used to join with int_sensors_enriched."
      - name: parameter_id
        description: "Numeric ID of the parameter being measured."
      - name: measurement_value
        description: "The actual recorded value. Physically impossible values and nulls are filtered out in this model."
      - name: measured_from_utc
        description: "Start time of the measurement interval in UTC."
        tests:
          - not_null
      - name: measured_to_utc
        description: "End time of the measurement interval in UTC."
      - name: measurement_id
        description: "Surrogate primary key for the measurement event."
      - name: measurement_interval
        description: "Duration of the measurement period (e.g., '1 hour')."
      - name: has_flags
        description: "Boolean flag indicating source data quality warnings. Filtered to FALSE in this model."
      - name: _audit_run_id
        description: "Airflow run ID associated with the ingestion of this record."
      - name: logical_date
        description: "Airflow logical date (execution date) representing the snapshot day."
      - name: extracted_at
        description: "UTC timestamp when the measurement was extracted from the source API."