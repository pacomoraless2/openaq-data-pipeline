version: 2

models:
  - name: stg_openaq__locations
    description: "Silver layer containing physical station details and metadata (daily snapshots)."
    columns:
      - name: record_id
        description: "Surrogate key for the record (hash of location_id and logical_date)."
        tests:
          - unique
          - not_null
      - name: location_id
        description: "Natural identifier for the location."
        tests:
          - not_null
          - is_non_negative
      - name: latitude
        description: "Latitude coordinate of the station."
        tests:
          - not_null
          - is_between:
              min_value: -90
              max_value: 90
      - name: longitude
        description: "Longitude coordinate of the station."
        tests:
          - not_null
          - is_between:
              min_value: -180
              max_value: 180
      - name: location_name
        description: "Name of the monitoring location."
      - name: locality
        description: "City, town, or localized geographic area of the station."
      - name: country_code
        description: "Two-letter ISO country code."
      - name: country_name
        description: "Full name of the country where the station is located."
      - name: provider_name
        description: "Name of the organization or provider maintaining the station and supplying the data."
      - name: is_mobile
        description: "Indicates if the station is mobile (true) or stationary (false)."
      - name: is_monitor
        description: "Indicates if the station is a reference-grade monitor."
      - name: timezone
        description: "Local timezone of the station (e.g., 'Europe/Madrid')."
      - name: _audit_run_id
        description: "Airflow run ID associated with the ingestion of this record."
      - name: logical_date
        description: "Airflow logical date (execution date) representing the snapshot day."
      - name: extracted_at
        description: "UTC timestamp when the record was extracted from the OpenAQ API."
# ----------------------------------------------------------------
  - name: stg_openaq__measurements
    description: "Silver layer containing air quality measurement facts."
    columns:
      - name: measurement_id
        description: "Surrogate primary key for the measurement (hash of sensor, parameter, and timestamp)."
        tests:
          - unique
          - not_null
      - name: sensor_parameter_key
        description: "Surrogate key to test the combination of sensor and parameter against the sensors dimension."
        tests:
          - not_null
          - relationships:
              to: ref('stg_openaq__sensors')
              field: sensor_parameter_key
      - name: sensor_id
        description: "ID of the sensor associated with the measurement."
        tests:
          - not_null
          - is_non_negative
      - name: parameter_id
        description: "ID of the measured parameter (e.g., PM2.5, Humidity). Kept in fact table for robust joins and fast filtering."
        tests:
          - not_null
          - is_non_negative
      - name: measurement_value
        description: "Numeric value of the recorded measurement."
        tests:
          - not_null
      - name: measured_from_utc
        description: "Start time of the measurement interval in UTC."
        tests:
          - not_null
      - name: measured_to_utc
        description: "End time of the measurement interval in UTC."
        tests:
          - not_null
      - name: measurement_interval
        description: "Duration of the measurement period (e.g., '1 hour')."
        tests:
          - not_null
      - name: has_flags
        description: "Boolean flag indicating if the source API reported any data quality warnings for this measurement."
      - name: _audit_run_id
        description: "Airflow run ID associated with the ingestion of this record."
      - name: logical_date
        description: "Airflow logical date (execution date) representing the snapshot day."
      - name: extracted_at
        description: "UTC timestamp when the measurement was extracted from the OpenAQ API."
# ----------------------------------------------------------------
  - name: stg_openaq__sensors
    description: "Silver layer containing sensors associated with each location."
    columns:
      - name: sensor_record_id
        description: "Surrogate key for the sensor record (hash of sensor_id and logical_date)."
        tests:
          - unique
          - not_null
      - name: sensor_parameter_key
        description: "Surrogate key representing the unique combination of a sensor and its parameter."
        tests:
          - not_null
      - name: location_id
        description: "ID of the parent location where the sensor is installed."
        tests:
          - not_null
          - is_non_negative
          - relationships:
              to: ref('stg_openaq__locations')
              field: location_id
      - name: sensor_id
        description: "Natural identifier for the sensor."
        tests:
          - not_null
          - is_non_negative
      - name: parameter_id
        description: "ID of the measured parameter."
        tests:
          - not_null
          - is_non_negative
      - name: sensor_name
        description: "Name or specific designation of the sensor instrument."
      - name: parameter_name
        description: "Standardized name of the parameter being measured (e.g., pm25, no2, temperature)."
      - name: unit
        description: "Unit of measurement for the parameter (e.g., µg/m³, ppm, °C)."
      - name: _audit_run_id
        description: "Airflow run ID associated with the ingestion of this record."
      - name: logical_date
        description: "Airflow logical date (execution date) representing the snapshot day."
      - name: extracted_at
        description: "UTC timestamp when the sensor metadata was extracted from the OpenAQ API."